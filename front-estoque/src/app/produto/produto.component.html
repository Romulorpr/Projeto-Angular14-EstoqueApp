<main id="conteudo">
    <div style="width:100%; margin:10px;">
        <h2 style="display:inline">Listagem de Produtos</h2>
        <button mat-fab color="primary" style="float:right" (click)="incluir()">
            <span style="font-size: 30px;">+</span>
        </button>
        <hr />
    </div>
    <div class="container">

        <div class="pnlProduto" *ngFor="let produto of produtos">
            {{produto.codigo}}<br />
            {{produto.nome}}<br />
            Quantidade: {{produto.quantidade}}<br />
            Categoria: {{produto.categoria}}
            <hr />
            <button mat-raised-button color="accent" class="btn-acao" (click)="editar(produto._id)">Editar</button>
            <button mat-raised-button color="warn" class="btn-acao" (click)="excluir(produto._id)">Excluir</button>
        </div>

    </div>

</main>
<app-lateral pagina="Listagem de Produtos"></app-lateral>
